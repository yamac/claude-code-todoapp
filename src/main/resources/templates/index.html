<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('TODO List', ~{::content})}">
<head>
    <title>TODO List</title>
</head>
<body>
    <div th:fragment="content">
            <div class="container my-5">
                <div class="row">
                    <div class="col-lg-10 mx-auto">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h2 class="mb-0">My TODOs</h2>
                            <a th:href="@{/todo/new}" class="btn btn-primary rounded-circle" style="width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">
                                <i class="bi bi-plus fs-4"></i>
                            </a>
                        </div>
                        
                        <div class="todo-list" th:if="${!todos.isEmpty()}">
                            <table class="table table-bordered">
                                <thead>
                                    <tr>
                                        <th width="50" class="text-center">✓</th>
                                        <th>Title</th>
                                        <th>Description</th>
                                        <th width="150">Created</th>
                                        <th width="100" class="text-center">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="todo : ${todos}" th:class="${todo.completed ? 'completed' : ''}">
                                        <td class="text-center">
                                            <form th:action="@{/todo/{id}/toggle(id=${todo.id})}" method="post" class="d-inline">
                                                <button type="submit" class="btn btn-sm p-0 border-0 bg-transparent">
                                                    <input type="checkbox" class="form-check-input" th:checked="${todo.completed}" style="pointer-events: none;">
                                                </button>
                                            </form>
                                        </td>
                                        <td th:text="${todo.title}"></td>
                                        <td>
                                            <span th:text="${todo.description}"></span>
                                            <span th:if="${todo.description == null || todo.description.isEmpty()}" class="text-muted">-</span>
                                        </td>
                                        <td th:text="${#temporals.format(todo.createdAt, 'yyyy/MM/dd')}"></td>
                                        <td class="text-center">
                                            <div class="d-flex justify-content-center gap-1">
                                                <a th:href="@{/todo/{id}/edit(id=${todo.id})}" class="btn btn-sm btn-outline-primary">
                                                    <i class="bi bi-pencil"></i>
                                                </a>
                                                <form th:action="@{/todo/{id}/delete(id=${todo.id})}" method="post" class="d-inline">
                                                    <button type="submit" class="btn btn-sm btn-outline-danger" 
                                                            onclick="return confirm('Are you sure you want to delete this TODO?')">
                                                        <i class="bi bi-trash"></i>
                                                    </button>
                                                </form>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        
                        <div th:if="${todos.isEmpty()}" class="text-center py-5">
                            <div class="card shadow-sm">
                                <div class="card-body py-5">
                                    <i class="bi bi-inbox display-1 text-muted"></i>
                                    <h4 class="mt-3 text-muted">No TODOs yet</h4>
                                    <p class="text-muted">Start by adding your first TODO item!</p>
                                    <a th:href="@{/todo/new}" class="btn btn-primary btn-lg mt-3">
                                        <i class="bi bi-plus-circle"></i> Add Your First TODO
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
