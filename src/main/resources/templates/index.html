<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('TODO List', ~{::content})}">
<head>
    <title>TODO List</title>
</head>
<body>
    <div th:fragment="content">
            <div class="container my-5">
                <div class="row">
                    <div class="col-lg-10 mx-auto">
                        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
                            <h2 class="mb-2 mb-md-0"><i class="bi bi-list-check"></i> My TODOs</h2>
                            <a th:href="@{/todo/new}" class="btn btn-primary">
                                <i class="bi bi-plus-circle"></i> <span class="d-none d-sm-inline">Add New TODO</span>
                                <span class="d-inline d-sm-none">Add</span>
                            </a>
                        </div>
                        
                        <div class="card shadow-sm" th:if="${!todos.isEmpty()}">
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-hover mb-0 table-responsive-stack">
                                        <thead class="table-light">
                                            <tr>
                                                <th width="80">Status</th>
                                                <th>Title</th>
                                                <th>Description</th>
                                                <th width="150">Created</th>
                                                <th width="150">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="todo : ${todos}" th:class="${todo.completed ? 'table-secondary text-decoration-line-through todo-completed' : ''}" class="todo-item">
                                                <td class="text-center" data-label="Status">
                                                    <form th:action="@{/todo/{id}/toggle(id=${todo.id})}" method="post" class="d-inline">
                                                        <button type="submit" class="btn btn-sm border-0" 
                                                                th:class="${todo.completed ? 'btn-success' : 'btn-outline-secondary'}">
                                                            <i th:class="${todo.completed ? 'bi bi-check-circle-fill' : 'bi bi-circle'}"></i>
                                                        </button>
                                                    </form>
                                                </td>
                                                <td th:text="${todo.title}" class="fw-semibold" data-label="Title"></td>
                                                <td data-label="Description">
                                                    <span th:text="${todo.description}" class="text-muted"></span>
                                                    <span th:if="${todo.description == null || todo.description.isEmpty()}" class="text-muted fst-italic">No description</span>
                                                </td>
                                                <td class="text-muted small" th:text="${#temporals.format(todo.createdAt, 'MM/dd HH:mm')}" data-label="Created"></td>
                                                <td data-label="Actions">
                                                    <div class="btn-group btn-group-sm d-none d-md-inline-flex" role="group">
                                                        <a th:href="@{/todo/{id}/edit(id=${todo.id})}" class="btn btn-outline-primary">
                                                            <i class="bi bi-pencil"></i> Edit
                                                        </a>
                                                        <form th:action="@{/todo/{id}/delete(id=${todo.id})}" method="post" class="d-inline">
                                                            <button type="submit" class="btn btn-outline-danger" 
                                                                    onclick="return confirm('Are you sure you want to delete this TODO?')">
                                                                <i class="bi bi-trash"></i>
                                                            </button>
                                                        </form>
                                                    </div>
                                                    <div class="btn-group-vertical btn-group-sm d-md-none" role="group">
                                                        <a th:href="@{/todo/{id}/edit(id=${todo.id})}" class="btn btn-outline-primary mb-1">
                                                            <i class="bi bi-pencil"></i> Edit
                                                        </a>
                                                        <form th:action="@{/todo/{id}/delete(id=${todo.id})}" method="post">
                                                            <button type="submit" class="btn btn-outline-danger w-100" 
                                                                    onclick="return confirm('Are you sure you want to delete this TODO?')">
                                                                <i class="bi bi-trash"></i> Delete
                                                            </button>
                                                        </form>
                                                    </div>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                        
                        <div th:if="${todos.isEmpty()}" class="text-center py-5">
                            <div class="card shadow-sm">
                                <div class="card-body py-5">
                                    <i class="bi bi-inbox display-1 text-muted"></i>
                                    <h4 class="mt-3 text-muted">No TODOs yet</h4>
                                    <p class="text-muted">Start by adding your first TODO item!</p>
                                    <a th:href="@{/todo/new}" class="btn btn-primary btn-lg mt-3">
                                        <i class="bi bi-plus-circle"></i> Add Your First TODO
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
