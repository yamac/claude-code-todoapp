<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('TODO List', ~{::content})}">
<head>
    <title>TODO List</title>
</head>
<body>
    <div th:fragment="content">
            <div class="container my-5">
                <div class="row">
                    <div class="col-12">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h2 class="mb-0">My TODOs <span class="heart-icon">♥</span></h2>
                            <a th:href="@{/todo/new}" class="btn btn-primary rounded-circle" style="width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">
                                <i class="bi bi-plus fs-4"></i>
                            </a>
                        </div>
                        
                        <div class="row todo-grid" id="todoGrid" th:if="${!todos.isEmpty()}">
                            <div class="col-lg-6 col-md-12 mb-3 todo-item" th:each="todo : ${todos}" th:data-id="${todo.id}" draggable="true">
                                <div class="todo-card" th:classappend="${todo.completed ? 'completed' : ''}">
                                    <div class="drag-handle" title="Drag to reorder">
                                        <i class="bi bi-grip-vertical"></i>
                                    </div>
                                    <div class="todo-checkbox">
                                        <form th:action="@{/todo/{id}/toggle(id=${todo.id})}" method="post">
                                            <button type="submit" class="checkbox-button">
                                                <i class="bi" th:class="${todo.completed ? 'bi-check-square-fill' : 'bi-square'}"></i>
                                            </button>
                                        </form>
                                    </div>
                                    <div class="todo-content">
                                        <h5 class="todo-title" th:text="${todo.title}"></h5>
                                        <p class="todo-description" th:text="${todo.description != null && !todo.description.isEmpty() ? todo.description : ''}"></p>
                                    </div>
                                    <div class="todo-date-wrapper">
                                        <small class="todo-date" th:text="${#temporals.format(todo.createdAt, 'yyyy/MM/dd')}"></small>
                                    </div>
                                    <div class="todo-actions">
                                        <a th:href="@{/todo/{id}/edit(id=${todo.id})}" class="btn btn-sm btn-link text-primary p-1">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <form th:action="@{/todo/{id}/delete(id=${todo.id})}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-sm btn-link text-danger p-1" 
                                                    onclick="return confirm('Are you sure you want to delete this TODO?')">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div th:if="${todos.isEmpty()}" class="text-center py-5">
                            <div class="card shadow-sm">
                                <div class="card-body py-5">
                                    <i class="bi bi-inbox display-1 text-muted"></i>
                                    <h4 class="mt-3 text-muted">No TODOs yet</h4>
                                    <p class="text-muted">Start by adding your first TODO item!</p>
                                    <a th:href="@{/todo/new}" class="btn btn-primary btn-lg mt-3">
                                        <i class="bi bi-plus-circle"></i> Add Your First TODO
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, initializing drag and drop');
            const todoGrid = document.getElementById('todoGrid');
            if (!todoGrid) {
                console.log('todoGrid not found');
                return;
            }
            
            let draggedElement = null;
            
            // Simple drag and drop implementation
            function addDragListeners() {
                const todoItems = todoGrid.querySelectorAll('.todo-item');
                console.log('Found', todoItems.length, 'todo items');
                
                todoItems.forEach((item, index) => {
                    console.log('Adding listeners to item', index, 'with ID', item.getAttribute('data-id'));
                    
                    item.addEventListener('dragstart', function(e) {
                        console.log('=== DRAG START ===');
                        console.log('Dragging item with ID:', this.getAttribute('data-id'));
                        draggedElement = this;
                        this.style.opacity = '0.5';
                        e.dataTransfer.effectAllowed = 'move';
                    });
                    
                    item.addEventListener('dragend', function(e) {
                        console.log('=== DRAG END ===');
                        this.style.opacity = '';
                        draggedElement = null;
                    });
                    
                    item.addEventListener('dragover', function(e) {
                        e.preventDefault();
                        if (draggedElement && draggedElement !== this) {
                            const afterElement = getDragAfterElement(todoGrid, e.clientY);
                            if (afterElement == null) {
                                todoGrid.appendChild(draggedElement);
                            } else {
                                todoGrid.insertBefore(draggedElement, afterElement);
                            }
                        }
                    });
                    
                    item.addEventListener('drop', function(e) {
                        e.preventDefault();
                        console.log('=== DROP EVENT ===');
                        console.log('Dropped on item with ID:', this.getAttribute('data-id'));
                        
                        if (draggedElement) {
                            console.log('Calling updateTodoOrder after successful drop');
                            setTimeout(() => {
                                updateTodoOrder();
                            }, 100);
                        }
                    });
                });
                
                // Grid level events
                todoGrid.addEventListener('dragover', function(e) {
                    e.preventDefault();
                });
                
                todoGrid.addEventListener('drop', function(e) {
                    e.preventDefault();
                    console.log('=== GRID DROP ===');
                    if (draggedElement) {
                        console.log('Grid drop - calling updateTodoOrder');
                        setTimeout(() => {
                            updateTodoOrder();
                        }, 100);
                    }
                });
            }
            
            function getDragAfterElement(container, y) {
                const draggableElements = [...container.querySelectorAll('.todo-item:not(.dragging)')];
                
                return draggableElements.reduce((closest, child) => {
                    const box = child.getBoundingClientRect();
                    const offset = y - box.top - box.height / 2;
                    
                    if (offset < 0 && offset > closest.offset) {
                        return { offset: offset, element: child };
                    } else {
                        return closest;
                    }
                }, { offset: Number.NEGATIVE_INFINITY }).element;
            }
            
            function updateTodoOrder() {
                console.log('=== UPDATE TODO ORDER ===');
                const todoItems = todoGrid.querySelectorAll('.todo-item');
                console.log('Found', todoItems.length, 'todo items in DOM');
                
                const todoIds = Array.from(todoItems).map((item, index) => {
                    const id = parseInt(item.getAttribute('data-id'));
                    console.log(`Position ${index + 1}: Todo ID ${id}`);
                    return id;
                });
                
                console.log('Final order to send to API:', todoIds);
                
                if (todoIds.length === 0) {
                    console.log('No todos found, skipping API call');
                    return;
                }
                
                fetch('/api/todos/reorder', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(todoIds)
                })
                .then(response => {
                    console.log('API Response status:', response.status);
                    if (response.ok) {
                        return response.json();
                    } else {
                        throw new Error('Failed to update todo order: ' + response.status);
                    }
                })
                .then(data => {
                    console.log('Reorder API success:', data);
                    console.log('Reloading page to reflect changes...');
                    setTimeout(() => {
                        window.location.reload();
                    }, 200);
                })
                .catch(error => {
                    console.error('Error updating todo order:', error);
                    window.location.reload();
                });
            }
            
            // Initialize drag and drop
            addDragListeners();
        });
    </script>
</body>
</html>
